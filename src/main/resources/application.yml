spring:
  application:
    name: gran-mente

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/granmente_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}

  jpa:
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-5-mini}
          max-completion-tokens: ${OPENAI_MAX_COMPLETION_TOKENS:500}

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m

app:
  seed:
    enabled: ${SEED_ENABLED:true}
  ai:
    fallback-enabled: ${AI_FALLBACK_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    pe.edu.utp.granmente: INFO
